<!DOCTYPE html>
<html>
<head>
  <title>Counter Appp</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    #count {
      font-size: 50px;
      margin: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Counter App</h1>

  <div id="count">0</div>

  <button onclick="increment()">+</button>
  <button onclick="decrement()">-</button>
  <button onclick="reset()">Reset</button>

  <script>
    let count = 0;

    function updateDisplay() {
      document.getElementById("count").innerText = count;
    }

    function increment() {
      count++;
      updateDisplay();
    }

    function decrement() {
      count--;
      updateDisplay();
    }

    function reset() {
      count = 0;
      updateDisplay();
    }
  </script>

</body>
</html>
