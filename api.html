<body>
    <!DOCTYPE html>
<html>
<head>
  <title>API Demo</title>
</head>

<body>

<h2>My First API App</h2>

<button onclick="getData()">Get Data</button>

<div id="data"></div>

<script>
function getData() {
  fetch("https://jsonplaceholder.typicode.com/posts")
    .then(function(res) {
      return res.json();
    })
    .then(function(data) {
      let output = "";

      for (let i = 0; i < 5; i++) {
        output += "<p>" + data[i].title + "</p>";
      }

      document.getElementById("data").innerHTML = output;
    });
}
</script>

</body>
</html>
</body>
</html>
