<!DOCTYPE html>
<html>
<head>
  <title>Country App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      border: none;
      background: blue;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkblue;
    }

    #result {
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      margin: auto;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    img {
      margin: 10px 0;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h2>🌍 Country Info App</h2>

  <input type="text" id="country" placeholder="Enter country name">
  <button onclick="getCountry()">Search</button>

  <div id="result"></div>

  <script>
    async function getCountry() {

      let country = document.getElementById("country").value.trim();

      if (!country) {
        document.getElementById("result").innerText = "Enter a country name";
        return;
      }

      let url = `https://restcountries.com/v3.1/name/${country}`;

      try {
        let response = await fetch(url);
        let data = await response.json();

        let c = data[0];

        document.getElementById("result").innerHTML =
          `<div class="card">
            <h2>${c.name.common}</h2>
            <img src="${c.flags.png}" width="150">
            <p><b>Capital:</b> ${c.capital[0]}</p>
            <p><b>Population:</b> ${c.population}</p>
            <p><b>Region:</b> ${c.region}</p>
          </div>`;

      } catch (error) {
        document.getElementById("result").innerText = "Country not found";
      }
    }
  </script>

</body>
</html>
